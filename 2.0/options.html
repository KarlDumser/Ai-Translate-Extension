<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 20px 22px 24px;
      min-width: 300px;
      font-size: 14px;
    }

    h1 {
      font-size: 16px;
      color: #cba6f7;
      margin-bottom: 18px;
      letter-spacing: 0.03em;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      color: #a6adc8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #cba6f7; }

    .hint {
      font-size: 11px;
      color: #585b70;
      margin-top: 4px;
    }
    .hint a { color: #89b4fa; }

    button {
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 7px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      transition: opacity 0.1s;
    }
    button:hover { opacity: 0.88; }

    #msg {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      color: #a6e3a1;
    }
    #msg.error { color: #f38ba8; }
  </style>
</head>
<body>
  <h1>⚙ JPN-DE Einstellungen</h1>

  <div class="field">
    <label>OpenAI API-Key <span style="color:#585b70;">(für KI-Chat)</span></label>
    <input id="apiKey" type="password" placeholder="sk-…" autocomplete="off" />
    <p class="hint">
      Nur für den Chat-Bereich nötig. Hol dir einen Key auf
      <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com</a>.
    </p>
  </div>

  <div class="field">
    <label>DeepL API-Key <span style="color:#585b70;">(optional, bessere Übersetzung)</span></label>
    <input id="deeplKey" type="password" placeholder="…:fx" autocomplete="off" />
    <p class="hint">
      Kostenlos bis 500.000 Zeichen/Monat.
      <a href="https://www.deepl.com/pro-api" target="_blank">deepl.com/pro-api</a><br>
      Ohne diesen Key wird MyMemory als Fallback genutzt.
    </p>
  </div>

  <button id="save">Speichern</button>
  <div id="msg"></div>

  <script src="options.js"></script>
</body>
</html>
